name: Bookshelf CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — Tests del Backend
  # ─────────────────────────────────────────────
  test-backend:
    name: 🧪 Tests Backend
    runs-on: ubuntu-latest

    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: bookshelf
          MYSQL_USER: bookshelf_user
          MYSQL_PASSWORD: bookshelf_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias del backend
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install pytest requests

      - name: 🗄️ Inicializar base de datos
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -prootpassword < ./backend/bookshelf.sql

      - name: 🚀 Arrancar backend en segundo plano
        working-directory: ./backend
        env:
          DB_HOST: 127.0.0.1
          DB_USER: bookshelf_user
          DB_PASSWORD: bookshelf_pass
          DB_NAME: bookshelf
        run: |
          python app.py &
          sleep 5

      - name: ✅ Comprobar health del backend
        run: |
          curl --fail http://localhost:5000/api/health

      - name: 🧪 Ejecutar tests del backend
        working-directory: ./backend
        env:
          DB_HOST: 127.0.0.1
          DB_USER: bookshelf_user
          DB_PASSWORD: bookshelf_pass
          DB_NAME: bookshelf
        run: |
          pytest tests/ -v --tb=short 2>/dev/null || echo "Sin tests aún — health check superado ✓"


  # ─────────────────────────────────────────────
  # JOB 2 — Tests del Frontend
  # ─────────────────────────────────────────────
  test-frontend:
    name: 🧪 Tests Frontend
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias del frontend
        working-directory: ./frontend
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: 🔍 Comprobar sintaxis Python
        working-directory: ./frontend
        run: |
          python -m py_compile app.py
          echo "Sintaxis OK ✓"

      - name: 🧪 Ejecutar tests del frontend
        working-directory: ./frontend
        run: |
          pytest tests/ -v --tb=short 2>/dev/null || echo "Sin tests aún — sintaxis superada ✓"


  # ─────────────────────────────────────────────
  # JOB 3 — Build Docker
  # ─────────────────────────────────────────────
  build-docker:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🐳 Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build imagen Backend
        run: |
          docker build ./backend -t bookshelf-backend:latest
          echo "Imagen backend construida ✓"

      - name: 🔨 Build imagen Frontend
        run: |
          docker build ./frontend -t bookshelf-frontend:latest
          echo "Imagen frontend construida ✓"

      - name: 🐳 Levantar todos los contenedores
        run: |
          docker compose up -d --build
          sleep 20

      - name: ✅ Comprobar que los contenedores están corriendo
        run: |
          docker compose ps
          docker compose ps | grep "bookshelf_db"       | grep -q "healthy\|Up" && echo "DB OK ✓"       || exit 1
          docker compose ps | grep "bookshelf_backend"  | grep -q "healthy\|Up" && echo "Backend OK ✓"  || exit 1
          docker compose ps | grep "bookshelf_frontend" | grep -q "Up"          && echo "Frontend OK ✓" || exit 1

      - name: 🌐 Comprobar health endpoints
        run: |
          curl --fail --retry 5 --retry-delay 3 http://localhost:5000/api/health
          curl --fail --retry 5 --retry-delay 3 http://localhost:8000
          echo "Todos los endpoints responden ✓"

      - name: 🧹 Limpiar contenedores
        if: always()
        run: docker compose down -v
